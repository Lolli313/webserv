# =========================
# Server 1: Default site
# =========================
server {
	listen 4443;
	server_name example.com www.example.com localhost;

	root /var/www/example;
	index index.html;

	autoindex off;
	client_max_body_size 5M;

	error_page {
		403 /errors/403.html;
		404 /errors/404.html;
		500 /errors/500.html;
		502 /errors/502.html;
		504 /errors/504.html;
		505 /errors/505.html;
	}

	location / {
		allow_methods GET;
	}

	location /redirect {
		return 302;
	}

	location /youtube {
		return 302 youtube.com;
	}
}

# =========================
# Server 2: API server
# =========================
server {
	listen 8080;
	server_name api.example.com;

	root /var/www/api;
	index index.json;

	autoindex off;
	client_max_body_size 20M;

	error_page 400 404 /errors/api_error.json;

	location / {
		allow_methods GET POST DELETE;
	}

	location /upload {
		allow_methods POST;
		client_max_body_size 100M;
	}
}

# =========================
# Server 3: Static files
# =========================
server {
	listen 80;
	server_name static.example.com;

	root /var/www/static;
	index index.html index.htm;

	autoindex on;

	location / {
		allow_methods GET;
	}

	location /images/ {
		autoindex on;
		allow_methods GET;
	}

	location /uploads {
		autoindex on;
		allow_methods GET POST DELETE;
	}
}

# =========================
# Server 4: Catch-all
# =========================
server {
	listen 80;
	server_name _;

	return 302 youtube.com;
}